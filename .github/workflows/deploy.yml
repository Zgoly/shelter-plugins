name: Deploy to GitHub Pages
# lune <- this word will trick shelter-index to pass the hopefullyUsesLune check

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './plugins/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
